<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pancakes &amp; Booze | Shows &amp; Links</title>
  <meta name="description" content="Where culture gets fed. Underground art shows in 40+ cities. Get tickets, exhibit your work, or set up shop.">
  <meta name="theme-color" content="#ff2d7b">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Pancakes &amp; Booze Art Show">
  <meta property="og:url" content="https://bio.pancakesandbooze.com">
  <meta property="og:title" content="Pancakes &amp; Booze | Shows &amp; Links">
  <meta property="og:description" content="Where culture gets fed. Underground art shows in 40+ cities.">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap');

    /* ═══════════════════════════════════════
       CSS TOKENS — mirrors pancakesandbooze.com
    ═══════════════════════════════════════ */
    :root {
      --black:         #0a0a0a;
      --dark:          #111111;
      --dark-card:     #161616;
      --dark-elevated: #1e1e1e;
      --dark-border:   #222222;
      --dark-border-hi:#333333;
      --white:         #f5f5f5;
      --gray:          #888888;
      --gray-light:    #b0b0b0;
      --accent:        #ff2d7b;
      --accent-hover:  #e0206c;
      --accent-dim:    rgba(255, 45, 123, 0.12);
      --accent-border: rgba(255, 45, 123, 0.25);
      --font-display:  'Bebas Neue', sans-serif;
      --font-body:     'Inter', sans-serif;
      --radius:        12px;
      --radius-full:   9999px;
      --ease:          0.18s ease;
    }

    /* ═══════════════════════════════════════
       RESET
    ═══════════════════════════════════════ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }
    body {
      font-family: var(--font-body);
      background: var(--dark);
      color: var(--white);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    a   { color: inherit; text-decoration: none; }
    img { max-width: 100%; height: auto; display: block; }

    /* ═══════════════════════════════════════
       PAGE SHELL
    ═══════════════════════════════════════ */
    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      padding: 0 16px 52px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ═══════════════════════════════════════
       TOP WORDMARK
    ═══════════════════════════════════════ */
    .top-wordmark {
      width: 100%;
      max-width: 420px;
      padding: 22px 0 30px;
      text-align: center;
    }
    .top-wordmark a {
      font-family: var(--font-display);
      font-size: 0.78rem;
      letter-spacing: 4px;
      color: var(--gray);
      text-transform: uppercase;
      transition: color var(--ease);
    }
    .top-wordmark a:hover { color: var(--gray-light); }

    /* ═══════════════════════════════════════
       AVATAR
    ═══════════════════════════════════════ */
    .avatar {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      background: var(--dark-card);
      border: 2.5px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      flex-shrink: 0;
      box-shadow: 0 0 0 4px var(--accent-dim);
    }
    .avatar-initials {
      font-family: var(--font-display);
      font-size: 1.65rem;
      letter-spacing: 1px;
      color: var(--accent);
      line-height: 1;
      user-select: none;
    }

    /* ═══════════════════════════════════════
       PROFILE TEXT
    ═══════════════════════════════════════ */
    .profile-name {
      font-family: var(--font-display);
      font-size: 2.5rem;
      letter-spacing: 3px;
      color: var(--white);
      text-align: center;
      line-height: 1;
      margin-bottom: 8px;
    }
    .profile-tagline {
      font-size: 0.73rem;
      font-weight: 500;
      color: var(--gray);
      text-align: center;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    /* ═══════════════════════════════════════
       CITY SELECTOR
    ═══════════════════════════════════════ */
    .selector-wrap {
      width: 100%;
      position: relative;
      margin-bottom: 10px;
    }
    .selector-wrap select {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      background: var(--dark-card);
      border: 1.5px solid var(--dark-border);
      border-radius: var(--radius);
      color: var(--white);
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 500;
      padding: 14px 44px 14px 16px;
      cursor: pointer;
      outline: none;
      transition: border-color var(--ease), background var(--ease);
    }
    .selector-wrap select:hover {
      border-color: var(--dark-border-hi);
      background: var(--dark-elevated);
    }
    .selector-wrap select:focus {
      border-color: var(--accent);
    }
    .selector-wrap select option {
      background: #1a1a1a;
      color: var(--white);
    }
    .selector-wrap select option:disabled {
      color: var(--gray);
    }
    .selector-chevron {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--gray);
      display: flex;
      align-items: center;
    }

    /* ═══════════════════════════════════════
       "DON'T SEE YOUR CITY?" LINK
    ═══════════════════════════════════════ */
    .no-city-link {
      font-size: 0.73rem;
      color: var(--gray);
      text-align: center;
      margin-bottom: 20px;
      width: 100%;
    }
    .no-city-link a {
      color: var(--gray-light);
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color var(--ease);
    }
    .no-city-link a:hover { color: var(--white); }

    /* ═══════════════════════════════════════
       FETCH FALLBACK
    ═══════════════════════════════════════ */
    .fetch-fallback {
      display: none;
      background: var(--dark-card);
      border: 1px solid var(--dark-border);
      border-radius: var(--radius);
      padding: 20px 16px;
      text-align: center;
      width: 100%;
      color: var(--gray-light);
      font-size: 0.88rem;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    /* ═══════════════════════════════════════
       EMPTY STATE
    ═══════════════════════════════════════ */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 36px 16px;
      width: 100%;
      opacity: 0.42;
    }
    .empty-state svg {
      width: 28px;
      height: 28px;
      color: var(--gray-light);
    }
    .empty-state p {
      font-size: 0.82rem;
      color: var(--gray-light);
      text-align: center;
    }

    /* ═══════════════════════════════════════
       SHOW CHIP
    ═══════════════════════════════════════ */
    .show-chip {
      display: none;
      align-items: center;
      gap: 6px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      border-radius: var(--radius-full);
      padding: 5px 12px 5px 9px;
      margin-bottom: 12px;
    }
    .show-chip svg {
      width: 12px;
      height: 12px;
      color: var(--accent);
      flex-shrink: 0;
    }
    .show-chip span {
      font-size: 0.73rem;
      font-weight: 600;
      color: var(--white);
      letter-spacing: 0.3px;
    }

    /* ═══════════════════════════════════════
       LINK PANEL
    ═══════════════════════════════════════ */
    .link-panel {
      display: none;
      flex-direction: column;
      width: 100%;
    }
    .link-panel.visible {
      display: flex;
      animation: panelIn 0.22s ease forwards;
    }
    @keyframes panelIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .section-label {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--gray);
      text-align: center;
      padding: 14px 0 8px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 13px 40px 13px 16px;
      background: var(--dark-card);
      border: 1.5px solid var(--dark-border);
      border-radius: var(--radius);
      color: var(--white);
      cursor: pointer;
      text-decoration: none;
      transition: background var(--ease), border-color var(--ease), transform var(--ease);
      margin-bottom: 8px;
      position: relative;
    }
    .link-btn:hover {
      background: var(--dark-elevated);
      border-color: var(--dark-border-hi);
      transform: translateY(-1px);
    }
    .link-btn:active { transform: translateY(0); }

    /* Right-pointing chevron */
    .link-btn::after {
      content: '';
      position: absolute;
      right: 17px;
      top: 50%;
      width: 6px;
      height: 6px;
      border-right: 1.5px solid currentColor;
      border-top: 1.5px solid currentColor;
      transform: translateY(-50%) rotate(45deg);
      opacity: 0.45;
    }

    .link-btn--primary {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--black);
    }
    .link-btn--primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }
    .link-btn--primary::after { opacity: 0.5; }

    .link-btn-content {
      display: flex;
      flex-direction: column;
    }
    .btn-label {
      font-size: 0.93rem;
      font-weight: 600;
      line-height: 1.3;
      color: var(--white);
    }
    .btn-sub {
      font-size: 0.68rem;
      font-weight: 400;
      color: var(--gray-light);
      line-height: 1.4;
      margin-top: 1px;
    }
    .link-btn--primary .btn-label {
      color: var(--black);
    }
    .link-btn--primary .btn-sub {
      color: rgba(10, 10, 10, 0.55);
    }

    /* ═══════════════════════════════════════
       FOOTER
    ═══════════════════════════════════════ */
    .footer {
      margin-top: 40px;
      text-align: center;
    }
    .footer a {
      font-size: 0.68rem;
      color: var(--gray);
      letter-spacing: 0.5px;
      transition: color var(--ease);
    }
    .footer a:hover { color: var(--gray-light); }
  </style>
</head>
<body>
  <div class="page">

    <!-- TOP WORDMARK -->
    <div class="top-wordmark">
      <a href="https://pancakesandbooze.com" target="_blank" rel="noopener">pancakesandbooze.com</a>
    </div>

    <div class="card">

      <!-- AVATAR -->
      <div class="avatar" aria-hidden="true">
        <span class="avatar-initials">P&amp;B</span>
      </div>

      <!-- PROFILE -->
      <h1 class="profile-name">Pancakes &amp; Booze</h1>
      <p class="profile-tagline">International Pop-Up Art Show&nbsp;&middot;&nbsp;40+ Cities</p>

      <!-- CITY SELECTOR -->
      <div class="selector-wrap" id="selector-wrap">
        <select id="city-select" aria-label="Pick a show">
          <option value="" disabled selected>— Pick a show —</option>
        </select>
        <span class="selector-chevron" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </span>
      </div>

      <!-- DON'T SEE YOUR CITY? -->
      <p class="no-city-link">
        Don't see your city?&nbsp;<a href="https://pancakesandbooze.com/locations#shows"
          target="_blank" rel="noopener">View all locations &rarr;</a>
      </p>

      <!-- FETCH FALLBACK — shown if shows-data.json fails to load -->
      <div class="fetch-fallback" id="fetch-fallback">
        Check back soon for upcoming shows.
      </div>

      <!-- EMPTY STATE — shown before a city is selected -->
      <div class="empty-state" id="empty-state" role="status">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        <p>Pick a city above to see show links.</p>
      </div>

      <!-- SHOW CHIP — appears when a city is selected -->
      <div class="show-chip" id="show-chip" aria-live="polite">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8"  y1="2" x2="8"  y2="6"/>
          <line x1="3"  y1="10" x2="21" y2="10"/>
        </svg>
        <span id="chip-label"></span>
      </div>

      <!-- LINK PANEL — populated by JS on city selection -->
      <div class="link-panel" id="link-panel" role="region" aria-label="Show links"></div>

    </div><!-- /.card -->

    <!-- FOOTER -->
    <footer class="footer">
      <a href="https://pancakesandbooze.com" target="_blank" rel="noopener">pancakesandbooze.com</a>
    </footer>

  </div><!-- /.page -->

  <script>
    (function () {
      'use strict';

      var shows = [];
      var selectedShow = null;

      document.addEventListener('DOMContentLoaded', function () {
        var citySelect    = document.getElementById('city-select');
        var selectorWrap  = document.getElementById('selector-wrap');
        var emptyState    = document.getElementById('empty-state');
        var showChip      = document.getElementById('show-chip');
        var chipLabel     = document.getElementById('chip-label');
        var linkPanel     = document.getElementById('link-panel');
        var fetchFallback = document.getElementById('fetch-fallback');

        /* ── Fetch shows data ──────────────────────────────── */
        fetch('./shows-data.json', { cache: 'no-store' })
          .then(function (res) {
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
          })
          .then(function (data) {
            if (!Array.isArray(data) || data.length === 0) {
              throw new Error('empty dataset');
            }
            shows = data;
            data.forEach(function (show) {
              var opt = document.createElement('option');
              opt.value = show.slug;
              opt.textContent = show.label;
              citySelect.appendChild(opt);
            });
          })
          .catch(function () {
            selectorWrap.style.display  = 'none';
            emptyState.style.display    = 'none';
            fetchFallback.style.display = 'block';
          });

        /* ── City selection handler ────────────────────────── */
        citySelect.addEventListener('change', function () {
          var slug = this.value;
          if (!slug) { resetPanel(); return; }

          selectedShow = null;
          for (var i = 0; i < shows.length; i++) {
            if (shows[i].slug === slug) { selectedShow = shows[i]; break; }
          }
          if (selectedShow) renderLinks(selectedShow);
        });

        /* ── Reset to empty state ──────────────────────────── */
        function resetPanel() {
          selectedShow = null;
          showChip.style.display = 'none';
          linkPanel.classList.remove('visible');
          linkPanel.innerHTML = '';
          emptyState.style.display = 'flex';
        }

        /* ── Render link panel for the selected show ───────── */
        function renderLinks(show) {
          emptyState.style.display = 'none';

          chipLabel.textContent = show.label;
          showChip.style.display = 'flex';

          linkPanel.innerHTML = '';

          /* Get Tickets — primary */
          linkPanel.appendChild(createBtn(
            'Get Tickets',
            show.ticket_subtitle || 'Presale available · 21+',
            show.tickets,
            'tickets',
            true
          ));

          /* Participate section */
          linkPanel.appendChild(createSectionLabel('Participate'));

          linkPanel.appendChild(createBtn(
            'Exhibit Your Art',
            show.artist_subtitle || 'No commission · Salon-style hang',
            show.artist,
            'artist',
            false
          ));

          linkPanel.appendChild(createBtn(
            'Table Vendor',
            show.vendor_subtitle || 'Table space · Goods & more',
            show.vendor,
            'vendor',
            false
          ));

          /* Info section */
          linkPanel.appendChild(createSectionLabel('Info'));

          linkPanel.appendChild(createBtn(
            'FAQs',
            show.faq_subtitle || 'Everything you need to know',
            show.faq,
            'faq',
            false
          ));

          linkPanel.classList.add('visible');
        }

        /* ── Build a link button element ───────────────────── */
        function createBtn(label, subtitle, href, action, isPrimary) {
          var a = document.createElement('a');
          a.href      = href || '#';
          a.target    = '_blank';
          a.rel       = 'noopener noreferrer';
          a.className = 'link-btn' + (isPrimary ? ' link-btn--primary' : '');

          var content = document.createElement('div');
          content.className = 'link-btn-content';

          var labelEl = document.createElement('span');
          labelEl.className   = 'btn-label';
          labelEl.textContent = label;

          var subEl = document.createElement('span');
          subEl.className   = 'btn-sub';
          subEl.textContent = subtitle;

          content.appendChild(labelEl);
          content.appendChild(subEl);
          a.appendChild(content);

          /* Zaraz tracking — fires before the new tab opens */
          a.addEventListener('click', function () {
            if (typeof zaraz !== 'undefined' && selectedShow) {
              zaraz.track('linkinbio_click', {
                show:   selectedShow.slug,
                action: action,
                source: 'linkinbio'
              });
            }
          });

          return a;
        }

        /* ── Build a section label element ─────────────────── */
        function createSectionLabel(text) {
          var div = document.createElement('div');
          div.className   = 'section-label';
          div.textContent = text;
          return div;
        }
      });
    })();
  </script>
</body>
</html>
